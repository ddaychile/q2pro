name: build

on:
  push:
    branches: [master, ci]
    tags: 
      - '*'
  pull_request:
    branches: [master]

env:
  MESON_ARGS: >-
    --auto-features=enabled
    --fatal-meson-warnings
    -Danticheat-server=true
    -Davcodec=disabled
    -Dclient-gtv=true
    -Dpacketdup-hack=true
    -Dtests=true
    -Dvariable-fps=true
    -Dwerror=true

  MESON_ARGS_WIN: >-
    -Dsdl2=disabled
    -Dwayland=disabled
    -Dwrap_mode=forcefallback
    -Dx11=disabled

  MESON_ARGS_LINUX: >-
    -Dwindows-crash-dumps=disabled
    -Dwrap_mode=nofallback

  MESON_ARGS_MACOS: >-
    -Dbuildtype=release
    -Dicmp-errors=disabled
    -Dpkg_config_path=/opt/homebrew/opt/openal-soft/lib/pkgconfig
    -Dwayland=disabled
    -Dwindows-crash-dumps=disabled
    -Dwrap_mode=nofallback
    -Dx11=disabled

  MESON_ARGS_FREEBSD: >-
    -Dbuildtype=release
    -Dc_std=c23
    -Dicmp-errors=disabled
    -Dwindows-crash-dumps=disabled
    -Dwrap_mode=nofallback

jobs:
  mingw:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: ["i686", "x86_64"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: subprojects/packagecache
          key: ${{ hashFiles('subprojects/*.wrap') }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64 nasm meson ninja-build

      - name: Build
        run: |
          meson setup --cross-file=.ci/${{ matrix.arch }}-w64-mingw32.txt \
          ${{ env.MESON_ARGS }} ${{ env.MESON_ARGS_WIN }} builddir
          meson compile -C builddir

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-mingw-${{ matrix.arch }}
          path: |
            builddir/*.exe
            builddir/*.dll

  msvc:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: ["x86", "x64"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: subprojects/packagecache
          key: ${{ hashFiles('subprojects/*.wrap') }}

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}
      - uses: ilammy/setup-nasm@v1

      - name: Install dependencies
        run: pip3 install --no-input meson ninja

      - name: Build
        run: |
          meson setup ${{ env.MESON_ARGS }} ${{ env.MESON_ARGS_WIN }} builddir
          meson compile -C builddir

      - name: Package Windows Binary
        shell: pwsh
        run: |
          Compress-Archive -Path builddir/*.exe, builddir/*.dll -DestinationPath q2pro-windows-${{ matrix.arch }}.zip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: q2pro-windows-${{ matrix.arch }}.zip

  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson libsdl2-dev libopenal-dev \
          libpng-dev libjpeg-dev zlib1g-dev mesa-common-dev \
          libcurl4-gnutls-dev libx11-dev libxi-dev \
          libwayland-dev wayland-protocols libdecor-0-dev

      - name: Build
        run: |
          meson setup ${{ env.MESON_ARGS }} ${{ env.MESON_ARGS_LINUX }} builddir
          meson compile -C builddir
        env:
          CC: ${{ matrix.cc }}

      - name: Package Linux Binary
        run: |
          cd builddir
          zip ../q2pro-linux-${{ matrix.cc }}.zip q2pro q2proded game*.so
          cd ..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.cc }}
          path: q2pro-linux-${{ matrix.cc }}.zip

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew update
          brew install meson sdl2 openal-soft libpng jpeg-turbo

      - name: Build
        run: |
          meson setup ${{ env.MESON_ARGS }} ${{ env.MESON_ARGS_MACOS }} builddir
          meson compile -C builddir

      - name: Package macOS Binary
        run: |
          cd builddir
          zip ../q2pro-macos.zip q2pro q2proded game*.dylib
          cd ..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: q2pro-macos.zip
            
  # Descargar y subir los achivos al release.
  release:
    needs: [mingw, msvc, linux, macos] # Espera a que todos terminen
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
           ./temp_artifacts/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE }}
            
